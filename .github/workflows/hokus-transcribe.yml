name: Hokus temporary model transfer

on:
  pull_request:
  workflow_dispatch:

jobs:
  fetch-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Download Whisper small model
        run: |
          mkdir -p whisper-model
          python - <<'PY'
          import urllib.request
          url='https://openaipublic.azureedge.net/main/whisper/models/9ecf779972d90ba49c06d968637d720dd632c55bbf19d441fb42bf17a411e794/small.pt'
          urllib.request.urlretrieve(url,'whisper-model/small.pt')
          PY
          ls -lh whisper-model/small.pt
      - uses: actions/upload-artifact@v4
        with:
          name: whisper-small-model
          path: whisper-model/small.pt
          compression-level: 0
          retention-days: 1
