name: Hokus temporary transcription

on:
  pull_request:
  workflow_dispatch:

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp faster-whisper requests
      - name: Download source audio
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p hokus-output
          URL='https://www.youtube.com/watch?v=rUMuHO09O_0'
          OUT='hokus-output/source.%(ext)s'
          yt-dlp --no-playlist --extractor-args 'youtube:player_client=android_vr' -f 'bestaudio/best' -o "$OUT" "$URL" || \
          yt-dlp --no-playlist --extractor-args 'youtube:player_client=tv_embedded' -f 'bestaudio/best' -o "$OUT" "$URL" || \
          yt-dlp --no-playlist --extractor-args 'youtube:player_client=web_safari' -f 'bestaudio/best' -o "$OUT" "$URL" || \
          yt-dlp --no-playlist --extractor-args 'youtube:player_client=android' -f 'bestaudio/best' -o "$OUT" "$URL"
          SRC=$(find hokus-output -maxdepth 1 -type f -name 'source.*' | head -n 1)
          test -n "$SRC"
          ffmpeg -y -i "$SRC" -vn -ac 1 -ar 16000 hokus-output/source.wav
      - name: Transcribe German with word timestamps
        run: |
          cat > /tmp/transcribe.py <<'PY'
          import json
          from faster_whisper import WhisperModel
          model = WhisperModel('medium', device='cpu', compute_type='int8')
          segments, info = model.transcribe(
              'hokus-output/source.wav', language='de', task='transcribe',
              beam_size=5, best_of=5, vad_filter=True,
              word_timestamps=True, condition_on_previous_text=True,
          )
          out=[]
          for s in segments:
              words=[{'start':w.start,'end':w.end,'word':w.word,'probability':w.probability} for w in (s.words or [])]
              out.append({'start':s.start,'end':s.end,'text':s.text.strip(),'words':words,'avg_logprob':s.avg_logprob,'no_speech_prob':s.no_speech_prob})
          with open('hokus-output/transcript.json','w',encoding='utf-8') as f:
              json.dump({'language':info.language,'duration':info.duration,'segments':out},f,ensure_ascii=False,indent=2)
          with open('hokus-output/transcript.txt','w',encoding='utf-8') as f:
              for x in out:
                  f.write(f"[{x['start']:.3f} --> {x['end']:.3f}] {x['text']}\n")
          PY
          python /tmp/transcribe.py
      - uses: actions/upload-artifact@v4
        with:
          name: hokus-transcript
          path: |
            hokus-output/transcript.json
            hokus-output/transcript.txt
          retention-days: 1
