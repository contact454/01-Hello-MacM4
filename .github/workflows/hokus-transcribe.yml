name: Hokus temporary model transfer

on:
  pull_request:
  workflow_dispatch:

jobs:
  fetch-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Download Whisper tiny model
        run: |
          mkdir -p whisper-model
          python - <<'PY'
          import urllib.request
          url='https://openaipublic.azureedge.net/main/whisper/models/65147644a518d12f04e32d6f3b26facc3f8dd46e5390956a9424a650c0ce22b9/tiny.pt'
          urllib.request.urlretrieve(url,'whisper-model/tiny.pt')
          PY
          ls -lh whisper-model/tiny.pt
      - uses: actions/upload-artifact@v4
        with:
          name: whisper-tiny-model
          path: whisper-model/tiny.pt
          compression-level: 0
          retention-days: 1
